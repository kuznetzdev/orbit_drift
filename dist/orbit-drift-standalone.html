const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, k) => a + (b - a) * k;
const hypot = Math.hypot;
const sqr = v => v * v;
const rnd = (rng, a, b) => a + rng() * (b - a);
const wrapAngle = a => Math.atan2(Math.sin(a), Math.cos(a));
const angleDiff = (a, b) => wrapAngle(b - a);
const smoothstep = (e0, e1, x) => {
  const t = clamp((x - e0) / Math.max(e1 - e0, 1e-9), 0, 1);
  return t * t * (3 - 2 * t);
};

function hash2(x, y) {
  let h = (Math.imul(x, 374761393) + Math.imul(y, 668265263) + Math.imul(worldSeed | 0, 1442695041)) | 0;
  h ^= h >>> 13;
  h = Math.imul(h, 1274126177);
  return (h ^ (h >>> 16)) >>> 0;
}

function mulberry32(a) {
  return function() {
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function valueNoise01(x, y, freq = .1) {
  const sx = x * freq;
  const sy = y * freq;
  const ix = Math.floor(sx);
  const iy = Math.floor(sy);
  const fx = smoothstep(0, 1, sx - ix);
  const fy = smoothstep(0, 1, sy - iy);
  const n00 = hash2(ix, iy) / 4294967295;
  const n10 = hash2(ix + 1, iy) / 4294967295;
  const n01 = hash2(ix, iy + 1) / 4294967295;
  const n11 = hash2(ix + 1, iy + 1) / 4294967295;
  return lerp(lerp(n00, n10, fx), lerp(n01, n11, fx), fy);
}

function stellarEnvironmentBias(cx, cy) {
  const broad = valueNoise01(cx + 193.17, cy - 91.43, .095);
  const medium = valueNoise01(cx * 1.9 - 54.2, cy * 1.9 + 28.8, .17);
  const fine = valueNoise01(cx * 4.2 + 17.5, cy * 4.2 - 31.9, .13);
  return clamp((broad - .5) * 1.3 + (medium - .5) * .55 + (fine - .5) * .25, -1, 1);
}

function chooseWeighted(items, rng) {
  const total = items.reduce((s, it) => s + it.w, 0);
  let roll = rng() * total;
  for (const it of items) {
    roll -= it.w;
    if (roll <= 0) return it.v;
  }
  return items[items.length - 1].v;
}

function chooseMainClass(rng, depth = 0, envBias = 0) {
  const bias = clamp(envBias, -1, 1);
  const classHeat = { M: -3, K: -2, G: -1, F: 1, A: 2, B: 3, O: 4 };
  let weights = Object.keys(MAIN_SEQUENCE).map(k => ({ v: k, w: MAIN_SEQUENCE[k].rarity }));
  if (depth < 5 || score < 22) {
    weights = weights.map(it => ({ v: it.v, w: (it.v === 'O' || it.v === 'B') ? it.w * .18 : it.w }));
  }
  if (score < 12) weights = weights.map(it => ({ v: it.v, w: it.v === 'O' ? 0 : (it.v === 'B' ? it.w * .2 : it.w) }));
  weights = weights.map(it => {
    const rank = classHeat[it.v] || 0;
    const shift = rank * bias;
    const mul = shift >= 0 ? (1 + shift * .20) : (1 / (1 + Math.abs(shift) * .18));
    return { v: it.v, w: Math.max(0, it.w * mul) };
  });
  return chooseWeighted(weights, rng);
}

function chooseStellarProfile(rng, depth = 0, envBias = 0) {
  const bias = clamp(envBias, -1, 1);
  const hot = Math.max(0, bias);
  const cold = Math.max(0, -bias);
  const specials = [];
  specials.push({ v: { family: 'main', class: chooseMainClass(rng, depth, bias) }, w: 92 * (1 - Math.abs(bias) * .12) });
  specials.push({ v: { family: 'brown', class: 'BD' }, w: (score > 6 ? 4.8 : 2.5) * (1 + cold * .62 - hot * .20) });
  specials.push({ v: { family: 'redgiant', class: 'RG' }, w: (score > 12 ? 2.8 : .5) * (1 + hot * .34) });
  specials.push({ v: { family: 'whitedwarf', class: 'WD' }, w: (score > 16 ? 2.2 : .2) * (1 + hot * .26) });
  specials.push({ v: { family: 'neutron', class: 'NS' }, w: (score > 32 ? .45 : 0) * (1 + hot * .48) });
  return chooseWeighted(specials, rng);
}

/*
 * Orbit Drift — 02-viewport-camera
 * Canvas sizing, low-power detection, starfield background, world/screen coordinate transforms.
 * Keep this file loaded after all earlier numbered files.
 */

'use strict';

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  const smallScreen = W < 760 || H < 520;
  lowPower = TOUCH_CAPABLE || smallScreen;
  uiScale = clamp(Math.min(W / 960, H / 640), .78, 1.08);
  // Keep mobile sharp enough, but avoid 2x/3x canvas overdraw on phones.
  DPR = Math.min(smallScreen ? 1.0 : (lowPower ? 1.08 : 1.55), window.devicePixelRatio || 1);
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildBackgroundStars();
  gravityFieldCache.frame = -999;
  predictionCache.frame = -999;
}

function buildBackgroundStars() {
  const count = Math.floor((W * H) / (lowPower ? 5600 : 3300));
  backgroundStars = [];
  for (let i = 0; i < count; i++) {
    backgroundStars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: rnd(Math.random, .25, 1.15),
      a: rnd(Math.random, .12, .62),
      layer: rnd(Math.random, .035, .31),
      p: Math.random() * TAU
    });
  }
}

function worldToScreen(x, y) {
  return { x: (x - camera.x) * camera.zoom + W / 2, y: (y - camera.y) * camera.zoom + H / 2 };
}

function screenToWorld(x, y) {
  return { x: (x - W / 2) / camera.zoom + camera.x, y: (y - H / 2) / camera.zoom + camera.y };
}


/* src/js/03-audio.js */
/*
 * Orbit Drift — 03-audio
 * Minimal Web Audio synthesizer, engine loop, sound cues, sound toggle.
 * Keep this file loaded after all earlier numbered files.
 */

'use strict';

function ensureAudio() {
  if (!soundOn) return;
  try {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = .72;
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    audioReady = true;
    ensureEngineSound();
  } catch (_) {
    audioReady = false;
  }
}

function ensureEngineSound() {
  if (!audioCtx || engineOsc) return;
  engineOsc = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  engineOsc.type = 'triangle';
  engineOsc.frequency.value = 46;
  engineGain.gain.value = .0001;
  engineOsc.connect(engineGain);
  engineGain.connect(masterGain || audioCtx.destination);
  engineOsc.start();
}

function tone(freq, duration = .08, type = 'sine', volume = .045, delay = 0) {
  if (!soundOn || !audioReady || !audioCtx) return;
  const now = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, now);
  gain.gain.setValueAtTime(.0001, now);
  gain.gain.exponentialRampToValueAtTime(Math.max(.0002, volume), now + .012);
  gain.gain.exponentialRampToValueAtTime(.0001, now + Math.max(.018, duration));
  osc.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  osc.start(now);
  osc.stop(now + duration + .05);
}

function chord(freqs, duration = .12, volume = .032, type = 'sine') {
  for (let i = 0; i < freqs.length; i++) tone(freqs[i], duration, type, volume / Math.sqrt(freqs.length), i * .018);
}

function noise(duration = .12, volume = .026, toneColor = 1200) {
  if (!soundOn || !audioReady || !audioCtx) return;
  const now = audioCtx.currentTime;
  const length = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
  const buffer = audioCtx.createBuffer(1, length, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 1.8);
  const src = audioCtx.createBufferSource();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  filter.type = 'bandpass';
  filter.frequency.value = toneColor;
  filter.Q.value = 3.2;
  gain.gain.setValueAtTime(.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + .01);
  gain.gain.exponentialRampToValueAtTime(.0001, now + duration);
  src.buffer = buffer;
  src.connect(filter);
  filter.connect(gain);
  gain.connect(masterGain || audioCtx.destination);
  src.start(now);
  src.stop(now + duration + .02);
}

function setEngineAudio(active, intensity = 0) {
  if (!soundOn || !audioReady || !audioCtx || !engineOsc || !engineGain) return;
  const now = audioCtx.currentTime;
  const gain = active ? clamp(.006 + intensity * .028, .005, .045) : .0001;
  const freq = 42 + intensity * 48 + (player ? (player.gravBoost || 0) * 26 : 0);
  engineOsc.frequency.setTargetAtTime(freq, now, .055);
  engineGain.gain.setTargetAtTime(gain, now, .075);
}

function toggleSound() {
  soundOn = !soundOn;
  if (soundOn) {
    ensureAudio();
    chord([440, 660, 990], .09, .035);
  } else if (engineGain && audioCtx) {
    engineGain.gain.setTargetAtTime(.0001, audioCtx.currentTime, .05);
  }
  writeSettings();
}

function soundCue(name, body = null, amount = 1) {
  if (!soundOn) return;
  ensureAudio();
  const hueShift = body && body.hue ? clamp((body.hue - 180) / 600, -.18, .22) : 0;
  if (name === 'start') chord([196, 294, 392], .12, .034);
  else if (name === 'scan') chord([420, 630, 945].map(f => f * (1 + hueShift)), .10, .038);
  else if (name === 'perfect') chord([528, 792, 1188].map(f => f * (1 + hueShift)), .16, .045);
  else if (name === 'assist') { tone(360 + amount * 18, .075, 'sine', .034); tone(520 + amount * 26, .10, 'sine', .032, .06); }
  else if (name === 'flow') { tone(300 + amount * 55, .075, 'sine', .024); tone(450 + amount * 62, .11, 'triangle', .018, .045); }
  else if (name === 'node') chord([720, 960, 1440], .10, .034);
  else if (name === 'route') tone(360 + amount * 90, .06, 'sine', .026);
  else if (name === 'fail') { tone(82, .22, 'sawtooth', .04); tone(51, .32, 'triangle', .03, .07); noise(.18, .022, 320); }
  else if (name === 'warn') tone(148, .065, 'triangle', .026);
  else if (name === 'select') tone(560 + amount * 80, .05, 'sine', .024);
}

/*
 * Orbit Drift — 04-world-generation
 * Astrophysical body factories and deterministic procedural map/chunk generation.
 * Keep this file loaded after all earlier numbered files.
 */

'use strict';

function orbitSpeedAround(parentMu, orbitA, rng, minMul = .96, maxMul = 1.04) {
  if (!parentMu || !orbitA) return 0;
  const base = Math.sqrt(parentMu / Math.max(orbitA * orbitA * orbitA, 1));
  const dir = rng() < .5 ? -1 : 1;
  return base * rnd(rng, minMul, maxMul) * dir;
}

function localEccentricityCap(orbitA, innerOrbit, outerOrbit, hardCap = .16) {
  const innerGap = Math.max(40, orbitA - (innerOrbit || (orbitA - 220)));
  const outerGap = Math.max(40, (outerOrbit || (orbitA + innerGap)) - orbitA);
  const localGap = Math.min(innerGap, outerGap);
  const capFromGap = clamp((localGap / Math.max(orbitA, 1)) * .46, .012, hardCap);
  return capFromGap;
}

function sTypeStabilityLimit(hostMass, companionMass, binaryA, binaryE) {
  if (!hostMass || !companionMass || !binaryA) return Infinity;
  const mu = companionMass / Math.max(hostMass + companionMass, .000001);
  const e = clamp(binaryE || 0, 0, .8);
  const ratio = clamp(
    0.464 - 0.380 * mu - 0.631 * e + 0.586 * mu * e + 0.150 * e * e - 0.198 * mu * e * e,
    0.08,
    0.58
  );
  return binaryA * ratio;
}

function stableOrbitCeiling(star, companion) {
  if (!companion) return Infinity;
  return sTypeStabilityLimit(star.mass, companion.mass, companion.orbitA, companion.orbitE) * .97;
}

function systemBaseOrbit(star) {
  return star.scan + (star.family === 'redgiant' ? 280 : 150);
}

function buildPlanetOrbitPlan(star, rng, planetCount, extreme = false) {
  const baseOrbit = systemBaseOrbit(star);
  const plan = [];
  const brown = star.family === 'brown';
  let orbitA = baseOrbit + rnd(rng, extreme ? 18 : 24, extreme ? 220 : 180);
  for (let i = 0; i < planetCount; i++) {
    if (i > 0) {
      const minStep = brown ? 120 : 165;
      const maxStep = brown ? 220 : 310;
      orbitA += rnd(rng, minStep * (extreme ? .78 : 1), maxStep * (extreme ? 1.38 : 1));
    }
    plan.push(orbitA);
  }
  return { baseOrbit, plan };
}

function stablePlanetOrbits(star, companion, orbitPlan) {
  const stableMaxOrbit = stableOrbitCeiling(star, companion);
  const usable = [];
  for (const orbit of orbitPlan) {
    if (star.heatRadius > 0 && orbit < star.heatRadius * .45 && star.luminosity > 50) continue;
    if (orbit > stableMaxOrbit) continue;
    usable.push(orbit);
  }
  return usable;
}

function addPlanetsOnOrbits(star, orbits, baseOrbit, rng, extreme = false) {
  const planets = [];
  for (let i = 0; i < orbits.length; i++) {
    const orbit = orbits[i];
    const inner = i > 0 ? orbits[i - 1] : Math.min(baseOrbit, orbit - 80);
    const outer = i + 1 < orbits.length ? orbits[i + 1] : orbit + (orbit - inner);
    const hardCap = star.family === 'redgiant' ? .18 : (extreme ? .17 : .13);
    const eCap = localEccentricityCap(orbit, inner, outer, hardCap);
    planets.push(addPlanet(star, orbit, rng() * TAU, rng, false, { maxEcc: eCap }));
  }
  return planets;
}

function populateSystemBodies(star, companion, rng, options = {}) {
  const canHavePlanets = star.family !== 'neutron' && star.family !== 'whitedwarf';
  const extreme = options.extreme ?? (rng() < .035 && star.family === 'main');
  const maxPlanets = options.maxPlanets || (star.family === 'brown' ? 3 : (extreme ? 6 : 5));
  const minPlanets = options.minPlanets || (canHavePlanets ? 1 : 0);
  const rawCount = canHavePlanets
    ? minPlanets + Math.floor(rng() * Math.max(1, maxPlanets - minPlanets + 1))
    : Math.floor(rng() * 2);
  const { baseOrbit, plan } = buildPlanetOrbitPlan(star, rng, rawCount, extreme);
  const usableOrbits = stablePlanetOrbits(star, companion, plan);
  if (!usableOrbits.length && companion && canHavePlanets) {
    const compactMin = star.scan + 70;
    const compactMax = stableOrbitCeiling(star, companion) * .92;
    if (compactMax > compactMin) usableOrbits.push(rnd(rng, compactMin, compactMax));
  }
  const planets = addPlanetsOnOrbits(star, usableOrbits, baseOrbit, rng, extreme);
  const outerAnchor = usableOrbits.length ? usableOrbits[usableOrbits.length - 1] : (baseOrbit + rnd(rng, 220, 420));

  if ((options.allowBelts !== false) && rng() < (extreme ? .58 : .45) && star.family !== 'neutron') {
    const beltR = outerAnchor + rnd(rng, 120, extreme ? 420 : 300);
    const n = 3 + Math.floor(rng() * (extreme ? 11 : 8));
    for (let i = 0; i < n; i++) addAsteroid(star, beltR + rnd(rng, -72, 82), rng() * TAU, rng);
  }
  if ((options.allowComets !== false) && rng() < (extreme ? .24 : .18) && star.family === 'main') {
    const n = rng() < (extreme ? .48 : .35) ? 2 : 1;
    const cometMin = Math.max(outerAnchor + 260, 760);
    const cometMax = Math.max(cometMin + 260, outerAnchor + (extreme ? 1320 : 960));
    for (let i = 0; i < n; i++) addComet(star, rnd(rng, cometMin, cometMax), rng() * TAU, rng);
  }
  return { planets, outerAnchor, extreme };
}

function starStats(profile, rng) {
  if (profile.family === 'main') {
    const d = MAIN_SEQUENCE[profile.class];
    const mass = d.mass * rnd(rng, .88, 1.12);
    const radiusSolar = d.radius * rnd(rng, .88, 1.14);
    const luminosity = d.lum * rnd(rng, .82, 1.22);
    return {
      family: 'main', class: profile.class, label: profile.class + 'V', name: d.name,
      mass, radiusSolar, luminosity, temperature: d.temp, hue: d.hue, reward: d.reward,
      visualR: 17 + Math.sqrt(radiusSolar) * 18,
      fieldBoost: 1,
      scanBoost: 1,
      compact: false
    };
  }
  if (profile.family === 'brown') {
    const mass = rnd(rng, .045, .075);
    return {
      family: 'brown', class: 'BD', label: 'BD', name: 'brown dwarf',
      mass, radiusSolar: rnd(rng, .08, .14), luminosity: rnd(rng, .0004, .004), temperature: Math.floor(rnd(rng, 900, 1900)), hue: 12, reward: 3,
      visualR: 18 + rng() * 4, fieldBoost: .75, scanBoost: .8, compact: false
    };
  }
  if (profile.family === 'redgiant') {
    const mass = rnd(rng, .85, 2.4);
    const radiusSolar = rnd(rng, 18, 72);
    const luminosity = rnd(rng, 90, 900);
    return {
      family: 'redgiant', class: 'RG', label: 'RG', name: 'red giant',
      mass, radiusSolar, luminosity, temperature: Math.floor(rnd(rng, 3300, 4700)), hue: 7, reward: 9,
      visualR: 42 + Math.sqrt(radiusSolar) * 7.2, fieldBoost: .96, scanBoost: 1.15, compact: false
    };
  }
  if (profile.family === 'whitedwarf') {
    const mass = rnd(rng, .58, 1.18);
    return {
      family: 'whitedwarf', class: 'WD', label: 'WD', name: 'white dwarf',
      mass, radiusSolar: rnd(rng, .012, .028), luminosity: rnd(rng, .012, .12), temperature: Math.floor(rnd(rng, 7000, 22000)), hue: 206, reward: 8,
      visualR: 13 + rng() * 3, fieldBoost: 1.42, scanBoost: .55, compact: true
    };
  }
  const mass = rnd(rng, 1.32, 2.05);
  return {
    family: 'neutron', class: 'NS', label: 'NS', name: 'neutron star',
    mass, radiusSolar: .00003, luminosity: rnd(rng, .04, .35), temperature: Math.floor(rnd(rng, 400000, 950000)), hue: 252, reward: 14,
    visualR: 11 + rng() * 3, fieldBoost: 2.25, scanBoost: .42, compact: true
  };
}

function addStar(profile, x, y, rng) {
  const s = starStats(profile, rng);
  const mu = G * s.mass;
  const body = {
    id: nextBodyId++,
    kind: 'star',
    family: s.family,
    class: s.class,
    label: s.label,
    name: s.name,
    x, y,
    vx: 0, vy: 0,
    mass: s.mass,
    radiusSolar: s.radiusSolar,
    luminosity: s.luminosity,
    temperature: s.temperature,
    mu,
    r: s.visualR,
    field: clamp((3000 + Math.sqrt(s.mass) * 4200 + Math.pow(Math.max(s.luminosity, .001), .06) * 520) * s.fieldBoost, 2600, FIELD_CUTOFF),
    scan: clamp((s.visualR + 108 + Math.sqrt(s.mass) * 58 + Math.pow(Math.max(s.luminosity, .001), .08) * 34) * s.scanBoost, s.visualR + 58, 430),
    scanWidth: s.compact ? 18 : 30 + Math.sqrt(s.radiusSolar) * 2.2,
    heatRadius: s.family === 'brown' ? 95 : 150 + Math.pow(Math.max(s.luminosity, .001), .25) * 420 + s.visualR * 2.6,
    hue: s.hue,
    reward: s.reward,
    visited: false,
    target: false,
    home: false,
    phase: rng() * TAU,
    spin: rnd(rng, -.18, .18),
    system: true,
    scanCooldown: 0,
    ring: false,
    gravitates: true,
    densityCode: s.mass / Math.max(s.radiusSolar * s.radiusSolar * s.radiusSolar, .000001)
  };
  bodies.push(body);
  return body;
}

function addCompanionStar(parent, profile, orbitR, angle, rng) {
  const comp = addStar(profile, parent.x + Math.cos(angle) * orbitR, parent.y + Math.sin(angle) * orbitR, rng);
  comp.parentId = parent.id;
  comp.orbitA = orbitR;
  comp.orbitE = rnd(rng, .02, .16);
  comp.orbitArg = rng() * TAU;
  comp.orbitAngle = angle;
  comp.orbitSpeed = orbitSpeedAround(parent.mu + comp.mu, orbitR, rng, .965, 1.035);
  comp.label = (comp.label || comp.class || 'ST') + '·B';
  comp.scan *= .88;
  comp.field = Math.min(comp.field, Math.max(2600, orbitR * 3.25));
  comp.binary = true;
  parent.binary = true;
  parent.binaryCompanionId = comp.id;
  parent.binaryOrbitA = orbitR;
  parent.binaryOrbitE = comp.orbitE;
  parent.binaryCompanionMass = comp.mass;
  comp.binaryPrimaryId = parent.id;
  comp.binaryOrbitA = orbitR;
  comp.binaryOrbitE = comp.orbitE;
  comp.binaryCompanionMass = parent.mass;
  return comp;
}

function choosePlanetType(rng, parent) {
  let pool = PLANET_TYPES.map(p => ({ v: p, w: 1 }));
  if (parent && (parent.class === 'O' || parent.class === 'B' || parent.family === 'redgiant')) {
    pool = pool.map(it => ({ v: it.v, w: it.v.key === 'ice' || it.v.key === 'ocean' ? .25 : it.w }));
  }
  if (parent && parent.family === 'brown') {
    pool = pool.map(it => ({ v: it.v, w: it.v.key === 'gas' || it.v.key === 'helium' ? .25 : it.w }));
  }
  return chooseWeighted(pool, rng);
}

function addPlanet(parent, orbitR, angle, rng, home = false, orbitTuning = null) {
  const t = home ? PLANET_TYPES[3] : choosePlanetType(rng, parent);
  const mass = rnd(rng, t.mass[0], t.mass[1]) * (home ? 1.25 : 1);
  const radius = rnd(rng, t.radius[0], t.radius[1]) * (home ? 1.12 : 1);
  const hue = rnd(rng, t.hue[0], t.hue[1]);
  const defaultEmax = parent && parent.family === 'redgiant' ? .20 : .12;
  const tunedEmax = orbitTuning && Number.isFinite(orbitTuning.maxEcc)
    ? clamp(orbitTuning.maxEcc, .01, defaultEmax)
    : defaultEmax;
  const e = home ? .02 : rnd(rng, 0, tunedEmax);
  const arg = rng() * TAU;
  const mu = G * mass;
  const body = {
    id: nextBodyId++,
    kind: 'planet',
    planetType: t.key,
    name: t.name,
    label: home ? 'HOME' : t.label,
    x: parent ? parent.x + Math.cos(angle) * orbitR : 0,
    y: parent ? parent.y + Math.sin(angle) * orbitR : 0,
    vx: 0, vy: 0,
    mass,
    earthMass: mass * 120,
    radiusSolar: 0,
    luminosity: 0,
    temperature: 0,
    mu,
    r: radius,
    field: clamp(1250 + Math.sqrt(mass) * 3550, 1100, 4200),
    scan: radius + 76 + Math.sqrt(mass) * 18,
    scanWidth: 24 + radius * .15,
    heatRadius: 0,
    hue,
    reward: home ? 0 : t.reward,
    visited: home,
    target: false,
    home,
    phase: rng() * TAU,
    parentId: parent ? parent.id : 0,
    orbitA: parent ? orbitR : 0,
    orbitE: e,
    orbitArg: arg,
    orbitAngle: angle,
    orbitSpeed: parent ? orbitSpeedAround(parent.mu, orbitR, rng, .96, 1.045) : 0,
    soi: parent ? clamp(orbitR * Math.pow(mass / Math.max(parent.mass * 3, .001), 1 / 3) * 5.8, radius * 14.0, 3600) : 2400,
    ring: rng() < t.ring || home,
    scanCooldown: 0,
    gravitates: true,
    densityCode: mass / Math.max(radius * radius * radius, 1)
  };
  bodies.push(body);
  return body;
}

function addAsteroid(parent, orbitR, angle, rng) {
  const mass = rnd(rng, .003, .014);
  const r = rnd(rng, 7, 15);
  const body = {
    id: nextBodyId++,
    kind: 'asteroid',
    name: 'carbon shard',
    label: 'AST',
    x: parent ? parent.x + Math.cos(angle) * orbitR : 0,
    y: parent ? parent.y + Math.sin(angle) * orbitR : 0,
    vx: 0, vy: 0,
    mass,
    mu: G * mass * .9,
    r,
    field: 390 + Math.sqrt(mass) * 720,
    scan: r + 40,
    scanWidth: 17,
    luminosity: 0,
    heatRadius: 0,
    hue: rnd(rng, 32, 62),
    reward: 1,
    visited: false,
    target: false,
    home: false,
    phase: rng() * TAU,
    spin: rnd(rng, -.75, .75),
    sides: 5 + Math.floor(rng() * 4),
    parentId: parent ? parent.id : 0,
    orbitA: parent ? orbitR : 0,
    orbitE: rnd(rng, .02, .14),
    orbitArg: rng() * TAU,
    orbitAngle: angle,
    orbitSpeed: parent ? orbitSpeedAround(parent.mu, orbitR, rng, .95, 1.08) : 0,
    soi: parent ? clamp(orbitR * Math.pow(mass / Math.max(parent.mass * 3, .001), 1 / 3) * 3.1, r * 7.5, 620) : 430,
    scanCooldown: 0,
    gravitates: true
  };
  bodies.push(body);
  return body;
}

function addComet(parent, orbitA, angle, rng) {
  const mass = rnd(rng, .004, .016);
  const body = {
    id: nextBodyId++,
    kind: 'comet',
    name: 'icy comet',
    label: 'CMT',
    x: parent ? parent.x + Math.cos(angle) * orbitA : 0,
    y: parent ? parent.y + Math.sin(angle) * orbitA : 0,
    vx: 0, vy: 0,
    mass,
    mu: G * mass * .7,
    r: rnd(rng, 7, 12),
    field: 460 + Math.sqrt(mass) * 880,
    scan: 55,
    scanWidth: 16,
    luminosity: 0,
    heatRadius: 0,
    hue: rnd(rng, 178, 212),
    reward: 4,
    visited: false,
    target: false,
    home: false,
    phase: rng() * TAU,
    spin: rnd(rng, -.5, .5),
    parentId: parent ? parent.id : 0,
    orbitA,
    orbitE: rnd(rng, .46, .72),
    orbitArg: rng() * TAU,
    orbitAngle: angle,
    orbitSpeed: parent ? orbitSpeedAround(parent.mu, orbitA, rng, .92, 1.08) : 0,
    soi: parent ? clamp(orbitA * Math.pow(mass / Math.max(parent.mass * 3, .001), 1 / 3) * 3.0, 96, 680) : 460,
    scanCooldown: 0,
    gravitates: true
  };
  bodies.push(body);
  return body;
}

function addBlackHole(x, y, rng) {
  const mass = rnd(rng, 4.0, 13.0);
  const body = {
    id: nextBodyId++,
    kind: 'blackhole',
    family: 'blackhole',
    class: 'BH',
    label: 'BH',
    name: 'stellar black hole',
    x, y,
    vx: 0, vy: 0,
    mass,
    radiusSolar: 0,
    luminosity: 0,
    temperature: 0,
    mu: G * mass * 2.35,
    r: 15 + Math.sqrt(mass) * 4.6,
    field: clamp(4200 + Math.sqrt(mass) * 3600, 3800, FIELD_CUTOFF),
    scan: 0,
    scanWidth: 0,
    heatRadius: 0,
    hue: 272,
    reward: 0,
    visited: true,
    target: false,
    home: false,
    phase: rng() * TAU,
    spin: rnd(rng, .35, .95),
    event: 42 + mass * 6.5,
    scanCooldown: 0,
    gravitates: true
  };
  bodies.push(body);
  return body;
}

function tooCloseToExisting(x, y, minD) {
  for (const b of bodies) if (hypot(b.x - x, b.y - y) < minD) return true;
  return false;
}

function ensureChunk(cx, cy) {
  const key = cx + ',' + cy;
  if (generated.has(key)) return;
  generated.add(key);

  const rng = mulberry32(hash2(cx, cy));
  const centerX = cx * CHUNK + CHUNK / 2;
  const centerY = cy * CHUNK + CHUNK / 2;
  const originDistance = hypot(centerX, centerY);
  if (originDistance < CHUNK * .62) return;

  if (rng() < .86) {
    const x = cx * CHUNK + rnd(rng, 290, CHUNK - 290);
    const y = cy * CHUNK + rnd(rng, 290, CHUNK - 290);
    if (!tooCloseToExisting(x, y, 720)) {
      const depth = Math.floor(originDistance / CHUNK);
      const environment = stellarEnvironmentBias(cx, cy);
      const star = addStar(chooseStellarProfile(rng, depth, environment), x, y, rng);
      let companion = null;
      if (rng() < .22 && star.family === 'main' && star.mass < 2.8) {
        const companionEnv = clamp(environment + rnd(rng, -.22, .22), -1, 1);
        const companionProfile = rng() < .82
          ? { family: 'main', class: chooseMainClass(rng, depth + 4, companionEnv) }
          : chooseStellarProfile(rng, depth + 4, companionEnv);
        if (companionProfile.family !== 'neutron') {
          companion = addCompanionStar(star, companionProfile, rnd(rng, 520, 980), rng() * TAU, rng);
        }
      }

      populateSystemBodies(star, companion, rng);
    }
  }

  if (score > 18 && rng() < .055) {
    const x = cx * CHUNK + rnd(rng, 340, CHUNK - 340);
    const y = cy * CHUNK + rnd(rng, 340, CHUNK - 340);
    if (!tooCloseToExisting(x, y, 1050)) addBlackHole(x, y, rng);
  }

  if (rng() < .14) {
    const x = cx * CHUNK + rnd(rng, 260, CHUNK - 260);
    const y = cy * CHUNK + rnd(rng, 260, CHUNK - 260);
    if (!tooCloseToExisting(x, y, 560)) {
      const rogue = addPlanet(null, 0, 0, rng);
      rogue.x = x;
      rogue.y = y;
      rogue.field *= .8;
      rogue.hue = 188 + rng() * 62;
      rogue.label = 'ROG';
      rogue.name = 'rogue planet';
      rogue.reward += 1;
    }
  }
}

function ensureChunksAround(x, y, range = 3) {
  const cx = Math.floor(x / CHUNK);
  const cy = Math.floor(y / CHUNK);
  for (let ix = cx - range; ix <= cx + range; ix++) {
    for (let iy = cy - range; iy <= cy + range; iy++) ensureChunk(ix, iy);
  }
}

function cleanupFarBodies() {
  if (!player || bodies.length < (lowPower ? 58 : 82)) return;
  const keepDistance = lowPower ? 5200 : 7000;
  let write = 0;
  for (let read = 0; read < bodies.length; read++) {
    const b = bodies[read];
    const keep = b.home
      || b.target
      || b.id === (target && target.id)
      || hypot(b.x - player.x, b.y - player.y) < keepDistance;
    if (keep) bodies[write++] = b;
  }
  bodies.length = write;
}

function newWorldSeed() {
  return ((Date.now() ^ Math.floor(Math.random() * 0xFFFFFFFF) ^ ((performance.now() * 1000) | 0)) >>> 0) || BASE_WORLD_SEED;
}


/* src/js/05-game-flow-objectives.js */
/*
 * Orbit Drift — 05-game-flow-objectives
 * World setup, start/end states, target selection, route objectives, scoring.
 * Keep this file loaded after all earlier numbered files.
 */

'use strict';

function setupWorld(preview = false) {
  worldSeed = newWorldSeed();
  mapCode = worldSeed.toString(16).toUpperCase().padStart(8, '0').slice(-6);
  gravityFieldCache.frame = -999;
  predictionCache.frame = -999;
  bodies = [];
  particles = [];
  texts = [];
  generated = new Set();
  nextBodyId = 1;
  target = null;
  score = 0;
  chain = 0;
  message = '';
  messageTime = 0;
  lastAssistBody = 0;
  assistMemory = null;
  objective = null;
  routeOptions = [];
  routeChoice = 0;
  navSignal = 0;
  gravityAdvice = '';
  gravityAdviceTime = 0;
  flowAwardLevel = 0;
  warningClock = 0;
  visitedNodes = new Set();
  tutorialHint = '';
  tutorialHintTime = 0;
  tutorialStage = 0;

  const homeStar = addStar({ family: 'main', class: 'G' }, 0, 0, Math.random);
  homeStar.home = true;
  homeStar.visited = true;
  homeStar.phase = 1.4;
  homeStar.r = 34;
  homeStar.scan = 230;
  homeStar.heatRadius = 540;
  homeStar.label = 'G2V';

  const homePlanet = addPlanet(homeStar, 370, -1.2, Math.random, true);
  homePlanet.hue = 208;
  homePlanet.r = 32;
  homePlanet.scan = 146;
  homePlanet.orbitSpeed = Math.sqrt(homeStar.mu / Math.max(homePlanet.orbitA * homePlanet.orbitA * homePlanet.orbitA, 1)) * .92;
  homePlanet.vx = -Math.sin(homePlanet.orbitAngle) * homePlanet.orbitA * homePlanet.orbitSpeed;
  homePlanet.vy =  Math.cos(homePlanet.orbitAngle) * homePlanet.orbitA * homePlanet.orbitSpeed;

  const spawnDx = -88;
  const spawnDy = -128;
  const spawnR = Math.hypot(spawnDx, spawnDy);
  const spawnTangent = Math.atan2(spawnDy, spawnDx) + Math.PI / 2;
  const spawnSpeed = Math.sqrt((homePlanet.mu * difficulty.gravity) / Math.max(spawnR, 1)) * .86;

  player = {
    x: homePlanet.x + spawnDx,
    y: homePlanet.y + spawnDy,
    vx: homePlanet.vx + Math.cos(spawnTangent) * spawnSpeed,
    vy: homePlanet.vy + Math.sin(spawnTangent) * spawnSpeed,
    angle: spawnTangent,
    r: 8.5,
    fuel: 86,
    maxFuel: 100,
    heat: 0,
    stress: 0,
    hull: 1,
    trail: [],
    thrusting: false,
    brake: false,
    driftCharge: 0,
    lastScanId: 0,
    lastScanAt: -99,
    noThrustTime: 0,
    gravBoost: 0,
    flowTime: 0,
    flowLevel: 0,
    nodeCooldown: 0,
    alive: true
  };

  camera.x = player.x;
  camera.y = player.y;
  camera.shake = 0;
  camera.zoom = 1;
  ensureChunksAround(0, 0, lowPower ? 2 : 3);
  chooseTarget(true);
  state = preview ? 'menu' : 'play';
}

function startGame() {
  ensureAudio();
  setupWorld(false);
  burst(player.x, player.y, 38, 200, .8);
  soundCue('start');
}

function clearGameplayInput() {
  pointer.down = false;
  pointer.has = false;
  pointer.last = 0;
  touchZoom.active = false;
  touchZoom.dist = 0;
  for (const code of Object.keys(keys)) keys[code] = false;
  if (player) {
    player.thrusting = false;
    player.brake = false;
  }
  setEngineAudio(false, 0);
}

function returnToDifficultyMenu() {
  if (state !== 'play' && state !== 'dead') return false;
  clearGameplayInput();
  setupWorld(true);
  clearGameplayInput();
  message = 'Выбор сложности';
  messageTime = 1.2;
  soundCue('select', null, 0);
  return true;
}

function endGame(reason) {
  if (state !== 'play') return;
  state = 'dead';
  message = reason;
  messageTime = 99;
  best = Math.max(best, score);
  saveBest();
  camera.shake = 22;
  burst(player.x, player.y, 78, 8, 1.15);
  soundCue('fail');
}

function routeBodyRisk(body) {
  return clamp(
    (body.kind === 'comet' ? .34 : 0)
    + (body.kind === 'asteroid' ? .10 : 0)
    + (body.binary ? .16 : 0)
    + (body.family === 'neutron' ? .76 : 0)
    + (body.family === 'whitedwarf' ? .52 : 0)
    + (body.class === 'O' || body.class === 'B' ? .60 : 0)
    + (body.luminosity > 50 ? .16 : 0),
    0,
    1
  );
}

function chooseTarget(force = false) {
  if (!player) return;
  ensureChunksAround(player.x, player.y, lowPower ? 3 : 4);

  const speedAngle = Math.atan2(player.vy, player.vx);
  const minD = (force ? 520 : 720 + Math.min(score, 45) * 7) * difficulty.targetMin;
  const maxD = (force ? 2300 : 3100 + Math.min(score, 65) * 15) * difficulty.targetMax;
  const candidates = [];
  const sectorX = Math.floor(player.x / CHUNK);
  const sectorY = Math.floor(player.y / CHUNK);
  const routeRng = mulberry32(hash2(sectorX * 4099 + score * 17 + (force ? 1 : 0), sectorY * 9173 + chain * 31));
  const riskPreference = clamp((difficulty.routeRisk - 1) * .92, -0.52, .46);

  for (const b of bodies) {
    if (b.kind === 'blackhole' || b.home || b.visited) continue;
    const d = hypot(b.x - player.x, b.y - player.y);
    if (d < minD || d > maxD) continue;
    const a = Math.atan2(b.y - player.y, b.x - player.x);
    const forward = (Math.cos(angleDiff(speedAngle, a)) + 1) * .5;
    const rewardWeight = Math.sqrt(b.reward || 1) / 4;
    const distanceFit = 1 - Math.abs(d - (minD + maxD) * .5) / ((maxD - minD) * .5);
    const variety = b.kind === 'comet' ? .2 : (b.kind === 'asteroid' ? .08 : (b.binary ? .1 : 0));
    const intrinsicRisk = routeBodyRisk(b);
    const baseScore = forward * .36 + distanceFit * .38 + rewardWeight * .23 + variety;
    const riskTerm = intrinsicRisk * riskPreference;
    candidates.push({
      body: b,
      risk: intrinsicRisk,
      v: baseScore + riskTerm + routeRng() * (.018 + difficulty.routeRisk * .014)
    });
  }

  if (!candidates.length) {
    const fallbackSeed = hash2(sectorX * 197 + Math.floor(score / 3) + (force ? 23 : 0), sectorY * 149 + chain * 5 + routeChoice);
    const fallbackRng = mulberry32(fallbackSeed);
    const a = speedAngle + rnd(fallbackRng, -.75, .75);
    const d = rnd(fallbackRng, 1700 * difficulty.targetMin, (3150 + score * 9) * difficulty.targetMax);
    const tx = player.x + Math.cos(a) * d;
    const ty = player.y + Math.sin(a) * d;
    const depth = Math.floor(hypot(tx, ty) / CHUNK);
    const env = stellarEnvironmentBias(Math.floor(tx / CHUNK), Math.floor(ty / CHUNK));
    const star = addStar(chooseStellarProfile(fallbackRng, Math.max(8, depth), env), tx, ty, fallbackRng);
    let companion = null;
    if (fallbackRng() < .28 && star.family === 'main') {
      const compEnv = clamp(env + rnd(fallbackRng, -.18, .18), -1, 1);
      companion = addCompanionStar(star, { family: 'main', class: chooseMainClass(fallbackRng, Math.max(9, depth + 1), compEnv) }, rnd(fallbackRng, 540, 920), fallbackRng() * TAU, fallbackRng);
    }
    populateSystemBodies(star, companion, fallbackRng, { minPlanets: star.family === 'neutron' ? 0 : 1, maxPlanets: 3 });
    routeOptions = [star];
    routeChoice = 0;
    setTarget(star, true);
    return;
  }

  candidates.sort((a, b) => b.v - a.v);
  routeOptions = [];
  const routeLimit = clamp(Math.floor(difficulty.routeOptionsCount || 3), 1, 6);
  for (const c of candidates) {
    if (!routeOptions.some(b => b.id === c.body.id)) routeOptions.push(c.body);
    if (routeOptions.length >= routeLimit) break;
  }
  if (!routeOptions.length) return;
  routeChoice = 0;
  setTarget(routeOptions[0], true);
}

function setTarget(body, announce = true) {
  for (const b of bodies) b.target = false;
  target = body || null;
  objective = target ? buildObjective(target) : null;
  if (target) {
    target.target = true;
    if (announce) {
      message = `${objective.title}: ${objective.condition}`;
      messageTime = 1.65;
    }
  }
}

function cycleTarget() {
  if (!player) return;
  routeOptions = routeOptions.filter(b => b && !b.visited && bodies.includes(b));
  if (routeOptions.length < 2) {
    chooseTarget(true);
    return;
  }
  routeChoice = (routeChoice + 1) % routeOptions.length;
  setTarget(routeOptions[routeChoice], true);
  soundCue('route', null, routeChoice);
}

function objectiveRoll(body) {
  const ix = Math.floor((body.x || 0) / 12) + Math.imul(body.id || 0, 73) + difficultyIndex * 997;
  const iy = Math.floor((body.y || 0) / 12) + Math.imul((body.reward || 1), 389) + (body.kind ? body.kind.length * 41 : 0);
  return mulberry32(hash2(ix, iy))();
}

function buildObjective(body) {
  const roll = objectiveRoll(body);
  let type = 'survey';
  if (body.kind === 'comet') type = roll < .7 ? 'rendezvous' : 'survey';
  else if (body.kind === 'planet') type = roll < .56 ? 'orbit' : 'sling';
  else if (body.kind === 'asteroid') type = roll < .62 ? 'survey' : 'silent';
  else if (body.kind === 'star') {
    if (body.family === 'neutron' || body.family === 'whitedwarf') type = roll < .6 ? 'tide' : 'sling';
    else if (body.luminosity > 18 || body.family === 'redgiant' || body.class === 'O' || body.class === 'B') type = roll < .64 ? 'skim' : 'survey';
    else type = roll < .48 ? 'orbit' : 'survey';
  }
  const defs = {
    survey:     { code: 'SCAN',   title: 'Скан цели', condition: 'пройди через кольцо сканирования', successText: 'Скан цели выполнен', partialText: 'Скан засчитан частично', hint: 'пролети через тонкое кольцо', bonus: 2, risk: 'низкий', reward: '+скан и топливо' },
    orbit:      { code: 'ORBIT',  title: 'Выйди на орбиту', condition: 'пройди кольцо ровной дугой', successText: 'Орбита засчитана', partialText: 'Орбита нестабильна, часть очков сохранена', hint: 'держи корабль на ровной дуге', bonus: 5, risk: 'средний', reward: '+точность' },
    sling:      { code: 'SLING',  title: 'Гравитационный разгон', condition: 'пролети рядом без тяги и набери скорость', successText: 'Разгон выполнен', partialText: 'Разгон не набран', hint: 'пройди рядом без тяги и выйди быстрее', bonus: 6, risk: 'средний', reward: '+скорость' },
    skim:       { code: 'SKIM',   title: 'Пролёт у звезды', condition: 'коснись зоны излучения и уйди без перегрева', successText: 'Опасный пролёт выполнен', partialText: 'Пролёт засчитан частично', hint: 'зайди в зону излучения и быстро уходи', bonus: 7, risk: 'нагрев', reward: '+риск' },
    rendezvous: { code: 'COMET',  title: 'Догнать комету', condition: 'сблизься с кометой на близкой скорости', successText: 'Сближение с кометой выполнено', partialText: 'Комета просканирована, скорость не выровнена', hint: 'сблизься с ней и выровняй скорость', bonus: 7, risk: 'скорость', reward: '+комета' },
    tide:       { code: 'TIDE',   title: 'Опасное сближение', condition: 'подойди близко и удержи нагрузку', successText: 'Опасное сближение выдержано', partialText: 'Сближение засчитано частично', hint: 'подойди близко, но не превысь нагрузку', bonus: 9, risk: 'нагрузка', reward: '+опасность' },
    silent:     { code: 'QUIET',  title: 'Скан без тяги', condition: 'пройди кольцо на инерции без тяги', successText: 'Скан без тяги выполнен', partialText: 'Скан засчитан, но тяга мешала', hint: 'пролети кольцо на инерции', bonus: 4, risk: 'контроль', reward: '+инерция' }
  };
  return { type, ...(defs[type] || defs.survey), bodyId: body.id, started: time };
}

function objectiveScore(body, perfect, quality, relSpeed, distance) {
  if (!body.target || !objective || objective.bodyId !== body.id) return { bonus: 0, ok: false, label: '' };
  let bonus = objective.bonus;
  let ok = false;
  let label = objective.code.toLowerCase();
  if (objective.type === 'orbit') {
    ok = perfect || quality > .72;
    bonus += Math.floor(quality * 4);
  } else if (objective.type === 'rendezvous') {
    ok = relSpeed < 210;
    bonus += relSpeed < 150 ? 3 : 0;
  } else if (objective.type === 'skim') {
    ok = body.kind === 'star' && relSpeed > 230 && player.heat < .9;
    bonus += Math.floor(clamp(relSpeed / 260, 0, 3));
  } else if (objective.type === 'tide') {
    ok = (player.stress || 0) > .16 && (player.stress || 0) < .96;
    bonus += Math.floor(clamp((player.stress || 0) * 8, 0, 5));
  } else if (objective.type === 'silent') {
    ok = player.noThrustTime > 1.2;
    bonus += player.noThrustTime > 2.6 ? 2 : 0;
  } else if (objective.type === 'sling') {
    ok = false;
    bonus = 0;
  } else {
    ok = true;
  }
  return { bonus: ok ? bonus : Math.floor(bonus * clamp(difficulty.partialObjectiveFactor, 0, .95)), ok, label };
}

function completeSlingObjective(body, points) {
  if (!target || !objective || objective.type !== 'sling' || body.id !== target.id || body.visited) return false;
  body.visited = true;
  body.scanCooldown = 3;
  chain += 1;
  const gained = (body.reward || 1) + objective.bonus + points + Math.min(5, Math.floor(player.driftCharge * .6));
  score += gained;
  best = Math.max(best, score);
  saveBest();
  player.fuel = clamp(player.fuel + 18 * difficulty.rewardFuelMul, 0, player.maxFuel);
  player.heat = Math.max(0, player.heat - .08 * difficulty.rewardHeatReliefMul);
  player.stress = Math.max(0, (player.stress || 0) - .05 * difficulty.rewardStressReliefMul);
  texts.push({ x: body.x, y: body.y - body.r - 42, text: `разгон +${gained}`, hue: body.hue, life: 1.45, max: 1.45 });
  burst(player.x, player.y, 66, body.hue, .85);
  message = objective.successText || 'Разгон выполнен';
  messageTime = 1.1;
  chooseTarget();
  return true;
}


/* src/js/06-physics-orbits.js */
/*
 * Orbit Drift — 06-physics-orbits
 * Moving bodies, gravity field, radiation, stellar wind, tidal stress, orbital elements.
 * Keep this file loaded after all earlier numbered files.
 */

'use strict';

const bodyLookupCache = {
  source: null,
  length: -1,
  firstId: 0,
  lastId: 0,
  byId: new Map()
};

const gravitySourceScratch = [];
const gravitySourceStrengths = [];
const gravitySourceResult = [];

function getBodyByIdIndex() {
  const length = bodies.length;
  const firstId = length > 0 ? bodies[0].id : 0;
  const lastId = length > 0 ? bodies[length - 1].id : 0;
  if (
    bodyLookupCache.source === bodies
    && bodyLookupCache.length === length
    && bodyLookupCache.firstId === firstId
    && bodyLookupCache.lastId === lastId
  ) {
    return bodyLookupCache.byId;
  }

  bodyLookupCache.source = bodies;
  bodyLookupCache.length = length;
  bodyLookupCache.firstId = firstId;
  bodyLookupCache.lastId = lastId;
  bodyLookupCache.byId.clear();
  for (let i = 0; i < bodies.length; i++) bodyLookupCache.byId.set(bodies[i].id, bodies[i]);
  return bodyLookupCache.byId;
}

function bodyIntersectsView(b, left, right, top, bottom) {
  const radius = b.field || b.r || 0;
  return b.x + radius > left && b.x - radius < right && b.y + radius > top && b.y - radius < bottom;
}

function gravitySourceStrength(b, cx, cy) {
  const d = Math.max(80, hypot(b.x - cx, b.y - cy) - (b.r || 0));
  return (b.mu || 0) / (d * d);
}

function insertGravitySource(list, strengths, candidate, strength, limit) {
  let insertAt = list.length;
  while (insertAt > 0 && strength > strengths[insertAt - 1]) insertAt--;
  if (insertAt >= limit) return;
  const nextLength = Math.min(list.length + 1, limit);
  for (let i = nextLength - 1; i > insertAt; i--) {
    list[i] = list[i - 1];
    strengths[i] = strengths[i - 1];
  }
  list[insertAt] = candidate;
  strengths[insertAt] = strength;
  list.length = nextLength;
  strengths.length = nextLength;
}

function updateBodies(dt) {
  const byId = getBodyByIdIndex();
  for (const b of bodies) {
    if (b.scanCooldown > 0) b.scanCooldown -= dt;
    if (b.kind === 'asteroid' || b.kind === 'comet') b.phase += (b.spin || 0) * dt;
    if (b.parentId) {
      const parent = byId.get(b.parentId);
      if (!parent) continue;
      const oldX = b.x;
      const oldY = b.y;
      const e = b.orbitE || 0;
      const a = b.orbitA || b.orbitR || 1;
      const cosNu = Math.cos(b.orbitAngle);
      const denom = Math.max(1e-4, 1 - e * e);
      const keplerFactor = e > .01 ? Math.pow(1 + e * cosNu, 2) / Math.pow(denom, 1.5) : 1;
      b.orbitAngle += b.orbitSpeed * keplerFactor * dt;
      const nu = b.orbitAngle;
      const rr = e > .01 ? a * (1 - e * e) / Math.max(.08, 1 + e * Math.cos(nu)) : a;
      const arg = b.orbitArg || 0;
      const cx = Math.cos(arg) * rr * Math.cos(nu) - Math.sin(arg) * rr * Math.sin(nu);
      const cy = Math.sin(arg) * rr * Math.cos(nu) + Math.cos(arg) * rr * Math.sin(nu);
      b.x = parent.x + cx;
      b.y = parent.y + cy;
      if (dt > 0) {
        b.vx = (b.x - oldX) / dt;
        b.vy = (b.y - oldY) / dt;
      }
    }
  }
}

function gravityAt(x, y, includeDominant = true) {
  return gravityAtFrom(bodies, x, y, includeDominant);
}

function gravityAtFrom(sourceBodies, x, y, includeDominant = true) {
  // Newtonian game-space gravity: a = μ * r / |r|³.
  // Field radius is only an optimization boundary. Inside it we keep the inverse-square law
  // and apply a soft final fade near the cutoff so far sources do not pop in/out.
  let ax = 0;
  let ay = 0;
  let dominant = null;
  let dominantMag = 0;
  for (const b of sourceBodies) {
    if (!b.gravitates || !b.mu) continue;
    const dx = b.x - x;
    const dy = b.y - y;
    const d2raw = dx * dx + dy * dy;
    const baseField = b.field || 0;
    const field = Math.max(baseField, b.soi || 0, (b.scan || 0) + 900) * difficulty.bodyRange;
    if (d2raw > field * field) continue;
    const d = Math.sqrt(d2raw) || 1;
    const compact = b.kind === 'blackhole' || b.family === 'neutron' || b.family === 'whitedwarf';
    const soft = Math.max(SOFTENING, b.r * (compact ? .18 : .42), b.kind === 'blackhole' ? (b.event || 36) * .32 : 0);
    const r2 = d2raw + soft * soft;
    // Do not damp the core field. Only fade during the last 14% of the optimization range.
    const edge = d / Math.max(field, 1);
    const fade = edge > .86 ? (1 - smoothstep(.86, 1, edge)) : 1;
    if (fade <= 0) continue;
    const accel = ((b.mu * difficulty.gravity) / r2) * fade;
    ax += (dx / d) * accel;
    ay += (dy / d) * accel;
    if (includeDominant && accel > dominantMag) {
      dominantMag = accel;
      dominant = b;
    }
  }
  return { ax, ay, body: dominant, mag: dominantMag };
}

function strongestGravitySources(extra = 2600, limit = 22) {
  const out = gravitySourceResult;
  out.length = 0;
  if (!player && state !== 'menu') return out;
  const cx = player ? player.x : camera.x;
  const cy = player ? player.y : camera.y;
  const left = camera.x - W / (2 * camera.zoom) - extra;
  const right = camera.x + W / (2 * camera.zoom) + extra;
  const top = camera.y - H / (2 * camera.zoom) - extra;
  const bottom = camera.y + H / (2 * camera.zoom) + extra;
  const ranked = gravitySourceScratch;
  const strengths = gravitySourceStrengths;
  ranked.length = 0;
  strengths.length = 0;

  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    if (!b.gravitates || !bodyIntersectsView(b, left, right, top, bottom)) continue;
    insertGravitySource(ranked, strengths, b, gravitySourceStrength(b, cx, cy), limit);
  }

  for (let i = 0; i < ranked.length; i++) out.push(ranked[i]);
  perf.gravSources = out.length;
  return out;
}

function radiationAt(x, y) {
  let flux = 0;
  let dominant = null;
  let dominantFlux = 0;
  for (const b of bodies) {
    if (b.kind !== 'star') continue;
    const dx = x - b.x;
    const dy = y - b.y;
    const d2 = dx * dx + dy * dy;
    if (d2 > b.heatRadius * b.heatRadius) continue;
    const safeD2 = Math.max(d2, sqr(b.r + 10));
    const f = (b.luminosity * 220000) / safeD2;
    flux += f;
    if (f > dominantFlux) { dominantFlux = f; dominant = b; }
  }
  return { flux, body: dominant, dominantFlux };
}

function stellarWindAt(x, y) {
  let ax = 0;
  let ay = 0;
  let body = null;
  let magMax = 0;
  for (const b of bodies) {
    if (b.kind !== 'star' || b.luminosity <= .05) continue;
    const dx = x - b.x;
    const dy = y - b.y;
    const d2raw = dx * dx + dy * dy;
    const range = Math.max(b.heatRadius, b.scan + 220);
    if (d2raw > range * range) continue;
    const d = Math.sqrt(d2raw) || 1;
    const safeD2 = Math.max(d2raw, sqr(b.r + 28));
    const pressure = clamp((Math.pow(b.luminosity, .55) * 1200) / safeD2, 0, b.class === 'O' || b.class === 'B' ? 18 : 9);
    const fade = 1 - smoothstep(.82, 1, d / range);
    const a = pressure * fade;
    ax += (dx / d) * a;
    ay += (dy / d) * a;
    if (a > magMax) { magMax = a; body = b; }
  }
  return { ax, ay, mag: magMax, body };
}

function tidalStressAt(x, y) {
  let stress = 0;
  let body = null;
  let maxS = 0;
  for (const b of bodies) {
    if (!b.gravitates) continue;
    const dx = x - b.x;
    const dy = y - b.y;
    const d = Math.max(hypot(dx, dy), (b.kind === 'blackhole' ? b.event : b.r) + 12);
    if (d > Math.max(b.scan + 420, b.field * .35)) continue;
    const compact = b.kind === 'blackhole' || b.family === 'neutron' || b.family === 'whitedwarf';
    const scale = compact ? 18 : (b.kind === 'star' ? 2.4 : .85);
    const s = (b.mu || 0) * scale / Math.pow(d, 3);
    stress += s;
    if (s > maxS) { maxS = s; body = b; }
  }
  return { stress, body };
}

function nearestBody() {
  if (!player) return { body: null, d: Infinity };
  let bestBody = null;
  let bestD = Infinity;
  for (const b of bodies) {
    const d = hypot(player.x - b.x, player.y - b.y);
    if (d < bestD) { bestD = d; bestBody = b; }
  }
  return { body: bestBody, d: bestD };
}

function orbitalElements(body) {
  if (!player || !body || !body.mu) return null;
  const rx = player.x - body.x;
  const ry = player.y - body.y;
  const r = hypot(rx, ry) || 1;
  const rvx = player.vx - (body.vx || 0);
  const rvy = player.vy - (body.vy || 0);
  const v2 = rvx * rvx + rvy * rvy;
  const rv = rx * rvx + ry * rvy;
  const mu = body.mu * difficulty.gravity;
  const h = rx * rvy - ry * rvx;
  const energy = .5 * v2 - mu / r;
  const evecx = ((v2 - mu / r) * rx - rv * rvx) / mu;
  const evecy = ((v2 - mu / r) * ry - rv * rvy) / mu;
  const ecc = hypot(evecx, evecy);
  const p = h * h / mu;
  const peri = p / Math.max(1 + ecc, .0001);
  const apo = ecc < .999 ? p / Math.max(1 - ecc, .0001) : Infinity;
  const a = Math.abs(energy) > 1e-6 ? -mu / (2 * energy) : Infinity;
  const circular = Math.sqrt(mu / Math.max(r, 1));
  const escape = Math.sqrt(2 * mu / Math.max(r, 1));
  const radial = rv / r;
  const tangent = h / r;
  const quality = clamp((1 - Math.abs(Math.abs(tangent) - circular) / Math.max(circular, 1)) * .65 + (1 - Math.abs(radial) / Math.max(circular * .65, 35)) * .35, 0, 1);
  return { r, v: Math.sqrt(v2), mu, h, energy, ecc, peri, apo, a, circular, escape, radial, tangent, quality, bound: energy < 0 && ecc < 1 };
}


/* src/js/07-simulation-gameplay.js */
/*
 * Orbit Drift — 07-simulation-gameplay
 * Frame update, gravity assists, heat/fuel, Lagrange nodes, scanning, particles, floating text.
 * Keep this file loaded after all earlier numbered files.
 */

'use strict';

function update(dt) {
  time += dt;
  frame++;
  if (messageTime > 0 && messageTime < 90) messageTime -= dt;
  if (gravityAdviceTime > 0) gravityAdviceTime -= dt;
  if (tutorialHintTime > 0) tutorialHintTime -= dt;
  updateBodies(dt);
  if (state === 'play') updateGame(dt);
  else setEngineAudio(false, 0);
  updateParticles(dt);
  updateTexts(dt);
}

function updateGame(dt) {
  if (frame % (lowPower ? 28 : 14) === 0) {
    ensureChunksAround(player.x, player.y, lowPower ? 1 : 2);
    cleanupFarBodies();
  }
  pointerWorld();

  const left = keys.KeyA || keys.ArrowLeft;
  const right = keys.KeyD || keys.ArrowRight;
  const thrustInput = pointer.down || keys.KeyW || keys.ArrowUp || keys.Space;
  const brakeInput = keys.KeyS || keys.ArrowDown;
  const preG = gravityAt(player.x, player.y, true);
  const gravityBurn = clamp(Math.log1p(preG.mag) / 9.6, 0, .55);

  const turnRate = 3.85;
  const pointerAimActive = pointer.has && performance.now() - pointer.last < Math.max(0, difficultyNumber('autoAimMs', 4500));
  if (pointerAimActive) {
    const desired = Math.atan2(pointer.wy - player.y, pointer.wx - player.x);
    player.angle += clamp(angleDiff(player.angle, desired), -turnRate * dt, turnRate * dt);
  }
  if (left) player.angle -= turnRate * .95 * dt;
  if (right) player.angle += turnRate * .95 * dt;

  let ctrlAx = 0;
  let ctrlAy = 0;
  let thrusting = false;

  if (thrustInput && player.fuel > .8) {
    const thrust = 76 * difficulty.thrust * (1 + gravityBurn * .35);
    ctrlAx += Math.cos(player.angle) * thrust;
    ctrlAy += Math.sin(player.angle) * thrust;
    player.fuel -= (9.8 - gravityBurn * 2.0) * dt;
    player.noThrustTime = 0;
    thrusting = true;
    engineParticles(dt);
  } else {
    player.noThrustTime += dt;
  }
  player.thrusting = thrusting;
  player.gravBoost = lerp(player.gravBoost || 0, thrusting ? gravityBurn : 0, 1 - Math.pow(.045, dt));

  if (brakeInput && player.fuel > .6) {
    const retro = Math.atan2(-player.vy, -player.vx);
    const brake = 62 * difficulty.brake;
    ctrlAx += Math.cos(retro) * brake;
    ctrlAy += Math.sin(retro) * brake;
    player.fuel -= 8.5 * dt;
    player.brake = true;
    brakeParticles(dt);
  } else {
    player.brake = false;
  }
  setEngineAudio(thrusting || player.brake, clamp(hypot(ctrlAx, ctrlAy) / 110, 0, 1));

  // Velocity Verlet / kick-drift-kick. It keeps orbits much more stable than a simple Euler step.
  const g0 = gravityAt(player.x, player.y, true);
  const w0 = stellarWindAt(player.x, player.y);
  const ax0 = g0.ax + w0.ax + ctrlAx;
  const ay0 = g0.ay + w0.ay + ctrlAy;
  const halfVx = player.vx + ax0 * dt * .5;
  const halfVy = player.vy + ay0 * dt * .5;
  const nextX = player.x + halfVx * dt;
  const nextY = player.y + halfVy * dt;
  const g1 = gravityAt(nextX, nextY, true);
  const w1 = stellarWindAt(nextX, nextY);
  const ax1 = g1.ax + w1.ax + ctrlAx;
  const ay1 = g1.ay + w1.ay + ctrlAy;

  updateThermalAndFuel(dt);
  if (state !== 'play') return;

  if (!thrusting && g1.body && g1.mag > 2.2) {
    player.driftCharge += dt * clamp(g1.mag / 26, .18, 3.1) * clamp(hypot(player.vx, player.vy) / 240, .42, 3.2);
  } else {
    player.driftCharge = Math.max(0, player.driftCharge - dt * .12);
  }
  player.driftCharge = clamp(player.driftCharge, 0, 10);
  updateGravityFlow(g1, dt);
  navSignal = lerp(navSignal, target ? clamp(1 - worldDistanceToTarget() / 5200, .05, 1) : 0, .03);

  detectGravityAssist(g1, dt);

  player.x = nextX;
  player.y = nextY;
  player.vx = halfVx + ax1 * dt * .5;
  player.vy = halfVy + ay1 * dt * .5;

  const speed = hypot(player.vx, player.vy);
  const maxSpeed = 980 * difficulty.maxSpeed;
  if (speed > maxSpeed) {
    const k = maxSpeed / speed;
    player.vx *= k;
    player.vy *= k;
  }

  if (!pointerAimActive && speed > 18 && !left && !right) {
    player.angle += angleDiff(player.angle, Math.atan2(player.vy, player.vx)) * difficultyNumber('autoAlignK', .02);
  }

  player.trail.push({ x: player.x, y: player.y, speed, heat: player.heat });
  if (player.trail.length > 150) player.trail.shift();

  checkCollisionsAndScans(dt);
  checkLagrangeNodes(dt);
  updateTutorialHints(thrusting, brakeInput);

  const lookX = player.x + player.vx * .33;
  const lookY = player.y + player.vy * .33;
  camera.x = lerp(camera.x, lookX, 1 - Math.pow(.0032, dt));
  camera.y = lerp(camera.y, lookY, 1 - Math.pow(.0032, dt));
  camera.shake = Math.max(0, camera.shake - dt * 25);
  const baseZoom = W < 700 ? .88 : 1;
  camera.zoom = lerp(camera.zoom, baseZoom * userZoom, .040);
}

function showTutorialHint(text, duration = 2.4) {
  tutorialHint = text;
  tutorialHintTime = duration;
}

function updateTutorialHints(thrusting, brakeInput) {
  if (!player || state !== 'play' || score > 8) return;
  if (tutorialHintTime > 0) return;
  if (tutorialStage === 0 && time > 1.0) {
    tutorialStage = 1;
    showTutorialHint('Тяга меняет курс. Отпускай её, чтобы поле вело корабль дальше.');
  } else if (tutorialStage === 1 && target && worldDistanceToTarget() < 1700) {
    tutorialStage = 2;
    showTutorialHint('Кольцо цели даёт очки. Чище дуга — выше награда.');
  } else if (tutorialStage === 2 && player.noThrustTime > 1.4 && player.driftCharge > 1.2) {
    tutorialStage = 3;
    showTutorialHint('Инерция копит заряд дуги. Риск окупается, пока нагрев и нагрузка в норме.');
  } else if (tutorialStage === 3 && (player.heat > .45 || player.stress > .45 || brakeInput || thrusting)) {
    tutorialStage = 4;
    showTutorialHint('Следи за нагревом и нагрузкой. Красные шкалы требуют выхода из поля.');
  }
}

function updateGravityFlow(g, dt) {
  if (!player || state !== 'play') return;
  const speed = hypot(player.vx, player.vy);
  const inReadableField = g && g.body && g.mag > 1.35 && speed > 95;
  if (!player.thrusting && inReadableField && player.heat < .92 && (player.stress || 0) < .96) {
    player.flowTime = (player.flowTime || 0) + dt;
    const level = Math.floor(player.driftCharge / 2.25);
    if (level > flowAwardLevel && level >= 1) {
      flowAwardLevel = level;
      const gained = Math.min(5, 1 + level);
      score += gained;
      best = Math.max(best, score);
      saveBest();
      texts.push({ x: player.x, y: player.y - 30, text: `чистая дуга +${gained}`, hue: g.body.hue || 205, life: 1.15, max: 1.15 });
      gravityAdvice = level >= 3 ? 'Поле держит курс. Не жги тягу без нужды.' : 'Хорошая дуга. Держи инерцию.';
      gravityAdviceTime = 1.6;
      soundCue('flow', g.body, level);
    }
  } else {
    player.flowTime = Math.max(0, (player.flowTime || 0) - dt * 1.25);
    if (player.driftCharge < .7) flowAwardLevel = 0;
  }
}

function detectGravityAssist(g, dt) {
  if (!g.body || !player || player.thrusting) return;
  const b = g.body;
  if (b.kind !== 'planet' && b.kind !== 'star') return;
  const d = hypot(player.x - b.x, player.y - b.y);
  if (d > Math.max(b.scan + 260, b.r + 360)) return;
  const relSpeed = hypot(player.vx - (b.vx || 0), player.vy - (b.vy || 0));
  if (!assistMemory || assistMemory.id !== b.id || time - assistMemory.t > 5) {
    assistMemory = { id: b.id, t: time, speedIn: relSpeed, minD: d, silent: player.noThrustTime };
    return;
  }
  assistMemory.minD = Math.min(assistMemory.minD, d);
  assistMemory.silent += dt;
  if (d > assistMemory.minD + 80 && assistMemory.silent > .55 && b.id !== lastAssistBody) {
    const gain = relSpeed - assistMemory.speedIn;
    if (gain > 7) {
      const points = clamp(Math.floor(gain / 8), 1, 12);
      score += points;
      best = Math.max(best, score);
      saveBest();
      texts.push({ x: player.x, y: player.y - 22, text: `гравиманёвр +${points}`, hue: b.hue, life: 1.2, max: 1.2 });
      burst(player.x, player.y, 30, b.hue, .55);
      soundCue('assist', b, points);
      lastAssistBody = b.id;
      message = 'Гравитация добавила скорость';
      messageTime = .9;
      completeSlingObjective(b, points);
    }
    assistMemory = null;
  }
}

function updateThermalAndFuel(dt) {
  const rad = radiationAt(player.x, player.y);
  const flux = rad.flux;
  player.fuel += dt * (2.7 + clamp(Math.sqrt(Math.max(flux, 0)) * .18, 0, 9)) * difficulty.fuelRegen;
  player.fuel = clamp(player.fuel, 0, player.maxFuel);

  const danger = Math.max(0, flux - .54);
  const heatAdd = clamp(danger * .065, 0, rad.body && (rad.body.class === 'O' || rad.body.class === 'B' || rad.body.family === 'redgiant') ? 1.5 : .92);
  player.heat += heatAdd * dt * difficulty.heatRisk;
  player.heat -= dt * (.09 + (player.thrusting ? 0 : .065));
  player.heat = clamp(player.heat, 0, 1.18);

  const tide = tidalStressAt(player.x, player.y);
  const targetStress = clamp(tide.stress * difficulty.stressRisk, 0, 1.28);
  player.stress = lerp(player.stress || 0, targetStress, 1 - Math.pow(.08, dt));
  if (player.stress > .92 && tide.body && Math.random() < dt * 16) {
    particles.push({ x: player.x + rnd(Math.random, -12, 12), y: player.y + rnd(Math.random, -12, 12), vx: rnd(Math.random, -18, 18), vy: rnd(Math.random, -18, 18), size: rnd(Math.random, 1, 2.5), hue: tide.body.hue || 255, life: .28, max: .28, drag: .92 });
  }

  const heatRisk = player.heat > .72;
  const stressRisk = player.stress > .72;
  warningClock = Math.max(0, warningClock - dt);
  if (warningClock <= 0 && (heatRisk || stressRisk)) {
    warningClock = .62;
    soundCue('warn');
    if (messageTime <= .16 || (message && message.startsWith('Риск:'))) {
      message = heatRisk && stressRisk
        ? 'Риск: перегрев и перегрузка'
        : (heatRisk ? 'Риск: перегрев' : 'Риск: перегрузка');
      messageTime = .78;
    }
  }

  if (player.heat >= 1) endGame('Корабль перегрелся у звезды');
  if (player.stress >= 1.08) endGame('Корабль не выдержал нагрузки');
}

function lagrangeNodesNearby(limit = 10) {
  if (!player) return [];
  const byId = new Map();
  for (const b of bodies) byId.set(b.id, b);
  const nodes = [];
  for (const p of bodies) {
    if (p.kind !== 'planet' || !p.parentId || p.home) continue;
    const parent = byId.get(p.parentId);
    if (!parent || parent.kind !== 'star') continue;
    const dToPlayer = hypot(player.x - p.x, player.y - p.y);
    if (dToPlayer > 2700) continue;
    const px = p.x - parent.x;
    const py = p.y - parent.y;
    const orbitR = hypot(px, py);
    if (orbitR < 180) continue;
    const base = Math.atan2(py, px);
    const stability = clamp((parent.mass || 1) / Math.max((p.mass || .02) * 42, .001), .25, 3.2);
    for (const item of [{label:'L4', sign: 1}, {label:'L5', sign: -1}]) {
      const a = base + item.sign * Math.PI / 3;
      const x = parent.x + Math.cos(a) * orbitR;
      const y = parent.y + Math.sin(a) * orbitR;
      const d = hypot(player.x - x, player.y - y);
      if (d > 2300) continue;
      const key = `${p.id}:${item.label}`;
      nodes.push({ x, y, d, key, label: item.label, hue: p.hue, body: p, parent, stability, reward: 3 + Math.floor(stability) + (p.reward || 1) });
    }
  }
  nodes.sort((a, b) => a.d - b.d);
  return nodes.slice(0, limit);
}

function checkLagrangeNodes(dt) {
  if (!player || state !== 'play') return;
  player.nodeCooldown = Math.max(0, (player.nodeCooldown || 0) - dt);
  if (player.nodeCooldown > 0) return;
  if (player.thrusting || player.noThrustTime < .7) return;
  const nodes = lagrangeNodesNearby(8);
  for (const n of nodes) {
    if (visitedNodes.has(n.key)) continue;
    const d = hypot(player.x - n.x, player.y - n.y);
    if (d > 46) continue;
    const rel = hypot(player.vx - (n.body.vx || 0), player.vy - (n.body.vy || 0));
    const quietBonus = player.noThrustTime > 2.0 ? 2 : 0;
    const speedBonus = rel < 190 ? 2 : 0;
    const gained = n.reward + quietBonus + speedBonus;
    visitedNodes.add(n.key);
    player.nodeCooldown = 1.2;
    score += gained;
    chain += 1;
    best = Math.max(best, score);
    saveBest();
    player.fuel = clamp(player.fuel + (20 + speedBonus * 4) * difficultyNumber('rewardFuelMul', 1), 0, player.maxFuel);
    player.driftCharge = clamp(player.driftCharge + 1.5, 0, 10);
    player.heat = Math.max(0, player.heat - .05 * difficultyNumber('rewardHeatReliefMul', 1));
    player.stress = Math.max(0, (player.stress || 0) - .04 * difficultyNumber('rewardStressReliefMul', 1));
    texts.push({ x: n.x, y: n.y - 24, text: `${n.label} точка +${gained}`, hue: n.hue, life: 1.45, max: 1.45 });
    burst(n.x, n.y, 44, n.hue, .72);
    soundCue('node', n.body, n.label === 'L4' ? 1 : 2);
    message = `${n.label}: спокойная точка пройдена`;
    messageTime = 1.05;
    return;
  }
}

function checkCollisionsAndScans(dt) {
  const now = time;
  for (const b of bodies) {
    const d = hypot(player.x - b.x, player.y - b.y);
    if (b.kind === 'blackhole') {
      if (d < b.event) {
        endGame('Корабль ушёл за горизонт событий');
        return;
      }
    } else if (d < b.r + player.r) {
      endGame(b.kind === 'star' ? 'Корабль сгорел в звезде' : 'Корабль столкнулся с объектом');
      return;
    }

    if (b.kind !== 'blackhole' && !b.home && !b.visited && b.scanCooldown <= 0) {
      const band = Math.abs(d - b.scan) < b.scanWidth * difficulty.scanEase;
      const speed = hypot(player.vx - (b.vx || 0), player.vy - (b.vy || 0));
      const safeSpeed = speed > difficultyNumber('scanMinSpeed', 78);
      if (band && safeSpeed && now - player.lastScanAt > .62) {
        const q = orbitalElements(b);
        scanBody(b, q && q.quality > difficultyNumber('perfectQuality', .76), q ? q.quality : 0, speed, d);
        return;
      }
    }
  }
}

function scanBody(body, perfect, quality, relSpeed = 0, distance = 0) {
  body.visited = true;
  body.scanCooldown = 3;
  player.lastScanId = body.id;
  player.lastScanAt = time;
  chain += 1;

  const obj = objectiveScore(body, perfect, quality, relSpeed, distance);
  const targetBonus = body.target ? 2 + obj.bonus : 0;
  const driftBonus = Math.min(6, Math.floor(player.driftCharge * .68));
  const perfectBonus = perfect ? Math.max(1, Math.ceil((body.reward || 1) * .45)) : 0;
  const riskBonus = body.family === 'neutron' || body.kind === 'comet' || body.family === 'whitedwarf' ? 2 : 0;
  const routeBonus = body.target && obj.ok ? Math.min(5, Math.floor(navSignal * 5)) : 0;
  const base = body.reward || 1;
  const gained = base + targetBonus + driftBonus + perfectBonus + riskBonus + routeBonus;
  score += gained;
  best = Math.max(best, score);
  saveBest();

  const fuelBonus = body.kind === 'star' ? 16 : (body.kind === 'comet' ? 10 : 24);
  player.fuel = clamp(player.fuel + (fuelBonus + perfectBonus * 4) * difficultyNumber('rewardFuelMul', 1), 0, player.maxFuel);
  player.heat = Math.max(0, player.heat - (perfect ? .13 : .07) * difficultyNumber('rewardHeatReliefMul', 1));
  player.stress = Math.max(0, (player.stress || 0) - .08 * difficultyNumber('rewardStressReliefMul', 1));

  const label = body.target && obj.label ? `${obj.label} +${gained}` : (perfect ? `орбита +${gained}` : `скан +${gained}`);
  texts.push({ x: body.x, y: body.y - body.r - 34, text: label, hue: body.hue, life: 1.35, max: 1.35 });
  burst(body.x, body.y, perfect || obj.ok ? 86 : 54, body.hue, perfect || obj.ok ? 1.25 : .88);
  camera.shake = Math.max(camera.shake, perfect || obj.ok ? 7 : 4);

  soundCue(perfect || obj.ok ? 'perfect' : 'scan', body);

  player.driftCharge = Math.max(0, player.driftCharge - 3.0);
  if (body.target && objective) {
    message = obj.ok
      ? (objective.successText || `${objective.title}: выполнено`)
      : (objective.partialText || `${objective.title}: частично выполнено`);
  } else {
    message = perfect ? 'Орбита стабилизирована' : `Скан завершён: ${labelOf(body)}`;
  }
  messageTime = .95;

  if (body.target) chooseTarget();
  else if (!target || target.visited) chooseTarget();
}

function pointerWorld() {
  const w = screenToWorld(pointer.x, pointer.y);
  pointer.wx = w.x;
  pointer.wy = w.y;
}

function engineParticles(dt) {
  const amount = Math.ceil(5 * dt * 60);
  for (let i = 0; i < amount; i++) {
    const a = player.angle + Math.PI + rnd(Math.random, -.34, .34);
    const speed = rnd(Math.random, 70, 160);
    particles.push({
      x: player.x - Math.cos(player.angle) * 13 + rnd(Math.random, -3, 3),
      y: player.y - Math.sin(player.angle) * 13 + rnd(Math.random, -3, 3),
      vx: player.vx * .12 + Math.cos(a) * speed,
      vy: player.vy * .12 + Math.sin(a) * speed,
      size: rnd(Math.random, 1.1, 2.6),
      hue: rnd(Math.random, 188, 216),
      life: rnd(Math.random, .16, .32),
      max: .32,
      drag: .94
    });
  }
}

function brakeParticles(dt) {
  if (Math.random() > dt * 42) return;
  particles.push({
    x: player.x + rnd(Math.random, -10, 10),
    y: player.y + rnd(Math.random, -10, 10),
    vx: rnd(Math.random, -35, 35),
    vy: rnd(Math.random, -35, 35),
    size: rnd(Math.random, 1, 2.2),
    hue: 186,
    life: .28,
    max: .28,
    drag: .91
  });
}

function burst(x, y, count, hue, power = 1) {
  count = Math.floor(lowPower ? count * .58 : count);
  for (let i = 0; i < count; i++) {
    const a = Math.random() * TAU;
    const s = rnd(Math.random, 34, 255) * power;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      size: rnd(Math.random, 1, 3),
      hue: hue + rnd(Math.random, -18, 18),
      life: rnd(Math.random, .38, 1.05),
      max: 1.05,
      drag: .982
    });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= Math.pow(p.drag || .98, dt * 60);
    p.vy *= Math.pow(p.drag || .98, dt * 60);
  }
  particles = particles.filter(p => p.life > 0);
  const particleLimit = lowPower ? 220 : 420;
  if (particles.length > particleLimit) particles.splice(0, particles.length - particleLimit);
}

function updateTexts(dt) {
  for (const f of texts) {
    f.life -= dt;
    f.y -= 30 * dt;
  }
  texts = texts.filter(f => f.life > 0);
}


/* src/js/08-render-space.js */
/*
 * Orbit Drift — 08-render-space
 * Scene rendering: background, grid, gravity map, trajectory prediction, bodies, ship, particles.
 * Keep this file loaded after all earlier numbered files.
 */

'use strict';

const visibleBodiesScratch = [];

function draw() {
  drawBackground();
  let sx = 0;
  let sy = 0;
  if (camera.shake > 0) {
    sx = rnd(Math.random, -camera.shake, camera.shake) * .5;
    sy = rnd(Math.random, -camera.shake, camera.shake) * .5;
  }
  ctx.save();
  ctx.translate(sx, sy);
  if (navLayer) drawCoordinateGrid();
  if (gravityLayer) drawGravityField();
  drawPredictedPath();
  drawOrbitGuide();
  drawRoute();
  drawLagrangeNodes();
  drawBodies();
  drawParticles();
  drawPlayer();
  drawGravityCompass();
  drawTexts();
  ctx.restore();
  drawHud();
}

function drawBackground() {
  const grd = ctx.createRadialGradient(W * .52, H * .42, 0, W * .5, H * .5, Math.max(W, H) * .82);
  grd.addColorStop(0, '#061027');
  grd.addColorStop(.56, '#020713');
  grd.addColorStop(1, '#01040b');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  for (const s of backgroundStars) {
    const x = ((s.x - camera.x * s.layer) % W + W) % W;
    const y = ((s.y - camera.y * s.layer) % H + H) % H;
    const a = s.a * (.66 + Math.sin(time * .75 + s.p) * .22);
    ctx.fillStyle = `rgba(230,242,255,${a})`;
    ctx.beginPath();
    ctx.arc(x, y, s.r, 0, TAU);
    ctx.fill();
  }

  const neb = ctx.createRadialGradient(W * .78, H * .08, 0, W * .78, H * .08, Math.max(W, H) * .72);
  neb.addColorStop(0, 'rgba(68, 103, 255, .055)');
  neb.addColorStop(.55, 'rgba(95, 42, 190, .03)');
  neb.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = neb;
  ctx.fillRect(0, 0, W, H);
}

function drawCoordinateGrid() {
  const spacing = 600;
  const minor = 150;
  const left = camera.x - W / (2 * camera.zoom) - spacing;
  const right = camera.x + W / (2 * camera.zoom) + spacing;
  const top = camera.y - H / (2 * camera.zoom) - spacing;
  const bottom = camera.y + H / (2 * camera.zoom) + spacing;
  ctx.save();
  ctx.lineWidth = 1;
  ctx.font = '10px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  for (let x = Math.floor(left / minor) * minor; x < right; x += minor) {
    const sp0 = worldToScreen(x, top);
    const sp1 = worldToScreen(x, bottom);
    const major = Math.abs(Math.round(x / spacing) * spacing - x) < 1;
    ctx.strokeStyle = major ? 'rgba(145,210,255,.045)' : 'rgba(145,210,255,.018)';
    ctx.beginPath();
    ctx.moveTo(sp0.x, sp0.y);
    ctx.lineTo(sp1.x, sp1.y);
    ctx.stroke();
    if (major && W > 680) {
      ctx.fillStyle = 'rgba(180,220,255,.14)';
      ctx.fillText(fmtSigned(x / 1000, 1), sp0.x + 4, 96);
    }
  }
  for (let y = Math.floor(top / minor) * minor; y < bottom; y += minor) {
    const sp0 = worldToScreen(left, y);
    const sp1 = worldToScreen(right, y);
    const major = Math.abs(Math.round(y / spacing) * spacing - y) < 1;
    ctx.strokeStyle = major ? 'rgba(145,210,255,.045)' : 'rgba(145,210,255,.018)';
    ctx.beginPath();
    ctx.moveTo(sp0.x, sp0.y);
    ctx.lineTo(sp1.x, sp1.y);
    ctx.stroke();
    if (major && W > 680) {
      ctx.fillStyle = 'rgba(180,220,255,.14)';
      ctx.fillText(fmtSigned(y / 1000, 1), 10, sp0.y + 4);
    }
  }
  ctx.restore();
}

function collectVisibleBodies(extra, out) {
  const left = camera.x - W / (2 * camera.zoom) - extra;
  const right = camera.x + W / (2 * camera.zoom) + extra;
  const top = camera.y - H / (2 * camera.zoom) - extra;
  const bottom = camera.y + H / (2 * camera.zoom) + extra;
  out.length = 0;
  for (let i = 0; i < bodies.length; i++) {
    const b = bodies[i];
    if (bodyIntersectsView(b, left, right, top, bottom)) out.push(b);
  }
  return out;
}

function visibleBodies(extra = 360) {
  return collectVisibleBodies(extra, []);
}

function rebuildGravityFieldCache() {
  const spacing = lowPower ? 132 : (W < 740 ? 104 : 78);
  const left = camera.x - W / (2 * camera.zoom) - spacing * 1.5;
  const right = camera.x + W / (2 * camera.zoom) + spacing * 1.5;
  const top = camera.y - H / (2 * camera.zoom) - spacing * 1.5;
  const bottom = camera.y + H / (2 * camera.zoom) + spacing * 1.5;
  const sources = strongestGravitySources(lowPower ? 2600 : 3600, lowPower ? 8 : (W < 760 ? 11 : 15));
  const lines = [];

  for (let x = Math.floor(left / spacing) * spacing; x < right; x += spacing) {
    for (let y = Math.floor(top / spacing) * spacing; y < bottom; y += spacing) {
      const jitter = Math.sin(x * .011 + y * .017 + time * .55) * 5;
      const sx = x + jitter;
      const sy = y - jitter;
      const g = gravityAtFrom(sources, sx, sy, true);
      const mag = hypot(g.ax, g.ay);
      if (mag < .045) continue;
      let px = sx;
      let py = sy;
      let prevX = px;
      let prevY = py;
      const pts = [{ x: px, y: py }];
      const steps = 3 + Math.floor(clamp(Math.log1p(mag) / 2.2, 0, 4));
      for (let step = 0; step < steps; step++) {
        const gg = gravityAtFrom(sources, px, py, false);
        const m = hypot(gg.ax, gg.ay) || 1;
        const len = clamp(13 + Math.log1p(m) * 5.8, 11, 52);
        prevX = px;
        prevY = py;
        px += (gg.ax / m) * len;
        py += (gg.ay / m) * len;
        pts.push({ x: px, y: py });
      }
      const hue = g.body ? g.body.hue : 205;
      const alpha = clamp(.065 + Math.log1p(mag) / 6.4, .055, .62);
      lines.push({ pts, hue, alpha, mag, ax: px - prevX, ay: py - prevY });
    }
  }

  gravityFieldCache = {
    frame,
    camX: camera.x,
    camY: camera.y,
    zoom: camera.zoom,
    width: W,
    height: H,
    lines
  };
  perf.fieldLines = lines.length;
}

function drawGravityField() {
  if (!gravityLayer) return;
  const moved = !isFinite(gravityFieldCache.camX)
    || hypot(camera.x - gravityFieldCache.camX, camera.y - gravityFieldCache.camY) > 42 / Math.max(camera.zoom, .2)
    || Math.abs(camera.zoom - gravityFieldCache.zoom) > .04
    || gravityFieldCache.width !== W
    || gravityFieldCache.height !== H;
  if (moved || frame - gravityFieldCache.frame > (lowPower ? 20 : 9)) rebuildGravityFieldCache();

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.lineWidth = 1;
  for (let i = 0; i < gravityFieldCache.lines.length; i++) {
    const line = gravityFieldCache.lines[i];
    const pulse = .86 + Math.sin(time * 1.8 + i * .37) * .14;
    ctx.strokeStyle = `hsla(${line.hue}, 96%, 74%, ${line.alpha * pulse})`;
    ctx.beginPath();
    const first = worldToScreen(line.pts[0].x, line.pts[0].y);
    ctx.moveTo(first.x, first.y);
    for (let p = 1; p < line.pts.length; p++) {
      const sp = worldToScreen(line.pts[p].x, line.pts[p].y);
      ctx.lineTo(sp.x, sp.y);
    }
    ctx.stroke();
    if ((i + frame) % 3 === 0 && line.pts.length > 1) {
      const last = line.pts[line.pts.length - 1];
      const tip = worldToScreen(last.x, last.y);
      const a = Math.atan2(line.ay, line.ax);
      const size = clamp(4.2 + Math.log1p(line.mag) * .9, 4.2, 9.5);
      ctx.fillStyle = `hsla(${line.hue}, 96%, 78%, ${line.alpha * .95})`;
      ctx.beginPath();
      ctx.moveTo(tip.x, tip.y);
      ctx.lineTo(tip.x - Math.cos(a - .55) * size, tip.y - Math.sin(a - .55) * size);
      ctx.lineTo(tip.x - Math.cos(a + .55) * size, tip.y - Math.sin(a + .55) * size);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();
}

function drawOrbitGuide() {
  if (!player || state !== 'play') return;
  const g = gravityAt(player.x, player.y, true);
  const b = g.body;
  if (!b || g.mag < .8) return;
  const orb = orbitalElements(b);
  if (!orb || orb.r > Math.max(b.field || 0, b.scan + 600)) return;
  const center = worldToScreen(b.x, b.y);
  const r = orb.r * camera.zoom;
  if (r < 38 || r > Math.max(W, H) * 1.35) return;
  const q = orb.bound ? orb.quality : 0;
  ctx.save();
  ctx.lineWidth = 1;
  ctx.setLineDash([2, 13]);
  ctx.lineDashOffset = -time * 20;
  ctx.strokeStyle = `hsla(${b.hue}, 95%, 74%, ${.05 + q * .19})`;
  ctx.beginPath();
  ctx.arc(center.x, center.y, r, 0, TAU);
  ctx.stroke();
  ctx.setLineDash([]);

  const rx = player.x - b.x;
  const ry = player.y - b.y;
  const radial = Math.atan2(ry, rx);
  const tangentDir = radial + (orb.tangent >= 0 ? Math.PI / 2 : -Math.PI / 2);
  const ps = worldToScreen(player.x, player.y);
  const len = clamp(orb.circular * .12, 26, 92);
  ctx.strokeStyle = `hsla(${b.hue}, 95%, 78%, ${.14 + q * .32})`;
  ctx.beginPath();
  ctx.moveTo(ps.x, ps.y);
  ctx.lineTo(ps.x + Math.cos(tangentDir) * len, ps.y + Math.sin(tangentDir) * len);
  ctx.stroke();
  ctx.fillStyle = `hsla(${b.hue},95%,78%,${.45 + q * .3})`;
  ctx.font = '10px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(q > .74 ? 'можно удержать орбиту' : (orb.bound ? 'корабль в поле' : 'курс на выход'), ps.x, ps.y - 30);
  ctx.restore();
}

function drawLagrangeNodes() {
  if (!player || state === 'menu' || !gravityLayer) return;
  const nodes = lagrangeNodesNearby(W < 760 ? 5 : 9);
  ctx.save();
  ctx.lineWidth = 1;
  ctx.font = '10px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const n of nodes) {
    const s = worldToScreen(n.x, n.y);
    if (s.x < -60 || s.x > W + 60 || s.y < -60 || s.y > H + 60) continue;
    const taken = visitedNodes.has(n.key);
    const pulse = 1 + Math.sin(time * 2.4 + n.body.id) * .15;
    const a = taken ? .045 : clamp(.32 - n.d / 7600, .08, .28);
    ctx.strokeStyle = `hsla(${n.hue}, 94%, 76%, ${a})`;
    ctx.fillStyle = `hsla(${n.hue}, 94%, 78%, ${taken ? .11 : .55})`;
    const r = (taken ? 8 : 12) * pulse;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y - r);
    ctx.lineTo(s.x + r * .86, s.y + r * .5);
    ctx.lineTo(s.x - r * .86, s.y + r * .5);
    ctx.closePath();
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(s.x, s.y, 2.2, 0, TAU);
    ctx.fill();
    if (!taken && n.d < 980) {
      ctx.fillStyle = `hsla(${n.hue},94%,80%,.62)`;
      ctx.fillText(n.label, s.x, s.y - 20);
    }
  }
  ctx.restore();
}

function drawGravityCompass() {
  if (!player || state !== 'play' || !gravityLayer) return;
  const g = gravityAt(player.x, player.y, true);
  const mag = hypot(g.ax, g.ay);
  if (mag < .012) return;
  const ps = worldToScreen(player.x, player.y);
  const angle = Math.atan2(g.ay, g.ax);
  const len = clamp(28 + Math.log1p(mag) * 28, 34, 168);
  const hue = g.body ? g.body.hue : 205;
  ctx.save();
  ctx.lineCap = 'round';
  ctx.strokeStyle = `hsla(${hue}, 96%, 78%, ${clamp(.38 + mag / 86, .42, .9)})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ps.x, ps.y);
  ctx.lineTo(ps.x + Math.cos(angle) * len, ps.y + Math.sin(angle) * len);
  ctx.stroke();
  const tipX = ps.x + Math.cos(angle) * len;
  const tipY = ps.y + Math.sin(angle) * len;
  ctx.fillStyle = `hsla(${hue}, 96%, 80%, .86)`;
  ctx.beginPath();
  ctx.moveTo(tipX, tipY);
  ctx.lineTo(tipX - Math.cos(angle - .55) * 8, tipY - Math.sin(angle - .55) * 8);
  ctx.lineTo(tipX - Math.cos(angle + .55) * 8, tipY - Math.sin(angle + .55) * 8);
  ctx.closePath();
  ctx.fill();
  ctx.font = '10px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
  ctx.textAlign = 'left';
  ctx.fillStyle = `hsla(${hue}, 96%, 82%, .72)`;
  ctx.fillText(`G ${fmtNum(mag, 1)} · ${g.body ? labelOf(g.body) : 'поле'}`, tipX + 8, tipY - 5);
  if ((player.gravBoost || 0) > .08) {
    ctx.fillStyle = `hsla(${hue}, 96%, 82%, .72)`;
    ctx.fillText(`поле помогает +${Math.round((player.gravBoost || 0) * 100)}%`, ps.x + 13, ps.y + 18);
  }
  ctx.restore();
}

function rebuildPredictionCache() {
  if (!player) return;
  const sources = strongestGravitySources(lowPower ? 3600 : 5200, lowPower ? 9 : (W < 760 ? 12 : 18));
  let x = player.x;
  let y = player.y;
  let vx = player.vx;
  let vy = player.vy;
  const dt = lowPower ? .078 : .062;
  const points = [{ x, y }];
  const baseSteps = lowPower ? 54 : 96;
  const predictSteps = clamp(
    Math.round(baseSteps * difficultyNumber('predictionStepsMul', 1)),
    lowPower ? 26 : 36,
    lowPower ? 124 : 220
  );
  for (let i = 0; i < predictSteps; i++) {
    const g0 = gravityAtFrom(sources, x, y, false);
    const w0 = stellarWindAt(x, y);
    const ax0 = g0.ax + w0.ax;
    const ay0 = g0.ay + w0.ay;
    const hvx = vx + ax0 * dt * .5;
    const hvy = vy + ay0 * dt * .5;
